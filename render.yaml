services:
  - type: web
    name: ich-gram
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install --include=dev --prefix frontend && npm run build --prefix frontend && npm install --prefix backend
    startCommand: npm start --prefix backend
    healthCheckPath: /health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: UPLOADS_DIR
        value: /opt/render/project/src/backend/uploads
